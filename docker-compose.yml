version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: invoice_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: invoicedb
      POSTGRES_USER: invoiceuser
      POSTGRES_PASSWORD: invoicepass
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U invoiceuser -d invoicedb"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: invoice_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://invoiceuser:invoicepass@db:5432/invoicedb
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"
    volumes:
      - ./backend:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: invoice_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
    driver: local
